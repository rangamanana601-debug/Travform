        <div class="login">
            <div class="icon">
                <i class="fa-solid fa-user"></i>
            </div>
            <input type="text" required>
            <label>Name</label>
        </div>
        <div class="login">

        </div>
        <div class="login">

        </div>
            <input type="password" required>
        <label>Password</label>
        </div>
          <div class="forget">
    <a href="#"><aside>Forget-Password?</aside></a>

        </div>
    </form>
